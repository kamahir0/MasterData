name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing Git tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate Release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.release_ref.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
      - id: release_ref
        name: Checkout release tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            tag="$INPUT_TAG"
          else
            if [[ "$GITHUB_REF" != refs/tags/* ]]; then
              echo "::error title=Invalid release ref::Release workflow must run from a tag, got $GITHUB_REF"
              exit 1
            fi
            tag="$GITHUB_REF_NAME"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error title=Invalid release tag::Release tag must use vMAJOR.MINOR.PATCH format, got $tag"
            exit 1
          fi

          if ! git fetch --force --depth=1 origin "refs/tags/${tag}:refs/tags/${tag}"; then
            echo "::error title=Release tag not found::Tag ${tag} does not exist. Create it with: git tag ${tag} && git push origin ${tag}"
            exit 1
          fi

          git checkout --detach "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - id: version
        name: Validate tag and workspace version
        env:
          TAG: ${{ steps.release_ref.outputs.tag }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import tomllib

          with open("Cargo.toml", "rb") as file:
              cargo = tomllib.load(file)

          version = cargo["workspace"]["package"]["version"]
          tag = os.environ["TAG"]

          expected = f"v{version}"
          if tag != expected:
              raise SystemExit(f"release tag {tag} must match workspace version {expected}")

          print(f"version={version}")
          print(f"tag={tag}")
          PY
      - name: Build CLI crates
        run: cargo build --locked -p master_data_init -p master_data_converter
      - name: Test CLI/core crates
        run: cargo test --locked -p master_data_core -p master_data_init -p master_data_converter

  build-cli:
    name: Build ${{ matrix.platform }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            exe: ""
          - platform: windows-x64
            os: windows-2025
            target: x86_64-pc-windows-msvc
            exe: ".exe"
          - platform: osx-arm64
            os: macos-26
            target: aarch64-apple-darwin
            exe: ""
          - platform: osx-x64
            os: macos-26-intel
            target: x86_64-apple-darwin
            exe: ""
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"
      - name: Build release binaries
        shell: bash
        run: |
          cargo build --locked --release \
            --target "${{ matrix.target }}" \
            -p master_data_init \
            -p master_data_converter
      - name: Package binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.platform }}"
          cp "target/${{ matrix.target }}/release/MasterDataInit${{ matrix.exe }}" \
            "dist/${{ matrix.platform }}/MasterDataInit-${{ matrix.platform }}${{ matrix.exe }}"
          cp "target/${{ matrix.target }}/release/MasterDataConverter${{ matrix.exe }}" \
            "dist/${{ matrix.platform }}/MasterDataConverter-${{ matrix.platform }}${{ matrix.exe }}"
          if [ -z "${{ matrix.exe }}" ]; then
            chmod +x "dist/${{ matrix.platform }}/MasterDataInit-${{ matrix.platform }}"
            chmod +x "dist/${{ matrix.platform }}/MasterDataConverter-${{ matrix.platform }}"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.platform }}
          path: dist/${{ matrix.platform }}/*
          if-no-files-found: error

  build-editor-macos:
    name: Build Editor ${{ matrix.platform }}
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64
            os: macos-26
            target: aarch64-apple-darwin
          - platform: macos-x64
            os: macos-26-intel
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install Rust target
        run: rustup target add "${{ matrix.target }}"
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/editor/package-lock.json
      - name: Install editor dependencies
        working-directory: apps/editor
        run: npm ci
      - name: Build unsigned app bundle
        working-directory: apps/editor
        run: npm run tauri:build -- --target "${{ matrix.target }}" --bundles app
      - name: Package unsigned DMG
        run: |
          set -euo pipefail
          mkdir -p "dist/editor-${{ matrix.platform }}"
          app="$(find target -path '*/release/bundle/macos/MasterData Editor.app' -type d | sort | head -n 1)"
          if [ -z "$app" ]; then
            echo "::error title=Missing app bundle::Tauri did not produce a macOS app bundle"
            exit 1
          fi
          tools/release/create-macos-dmg.sh \
            "$app" \
            "dist/editor-${{ matrix.platform }}/MasterDataEditor-${{ matrix.platform }}.dmg"
      - name: Verify DMG contents
        run: |
          set -euo pipefail
          tools/release/verify-macos-dmg.sh \
            "dist/editor-${{ matrix.platform }}/MasterDataEditor-${{ matrix.platform }}.dmg"
      - uses: actions/upload-artifact@v7
        with:
          name: editor-${{ matrix.platform }}
          path: dist/editor-${{ matrix.platform }}/*
          if-no-files-found: error

  build-editor-windows:
    name: Build Editor windows-x64
    needs: validate
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - name: Install Rust stable
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Install Rust target
        shell: bash
        run: rustup target add x86_64-pc-windows-msvc
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/editor/package-lock.json
      - name: Install editor dependencies
        working-directory: apps/editor
        run: npm ci
      - name: Build unsigned NSIS installer
        working-directory: apps/editor
        run: npm run tauri:build -- --target x86_64-pc-windows-msvc --bundles nsis
      - name: Package installer and portable zip
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "dist/editor-windows-x64" | Out-Null

          $Installer = Get-ChildItem -Path "target" -Recurse -File -Filter "*.exe" |
            Where-Object { $_.FullName -match "\\bundle\\nsis\\" -and $_.Name -match "setup" } |
            Sort-Object FullName |
            Select-Object -First 1
          if (-not $Installer) {
            throw "Tauri did not produce a Windows NSIS setup executable."
          }
          Copy-Item $Installer.FullName "dist/editor-windows-x64/MasterDataEditor-windows-x64-setup.exe"

          $PortableExe = "target/x86_64-pc-windows-msvc/release/master_data_editor.exe"
          if (-not (Test-Path $PortableExe)) {
            throw "Release executable was not found: $PortableExe"
          }
          New-Item -ItemType Directory -Force -Path "dist/editor-windows-x64/portable" | Out-Null
          Copy-Item $PortableExe "dist/editor-windows-x64/portable/MasterDataEditor.exe"
          Compress-Archive `
            -Path "dist/editor-windows-x64/portable/MasterDataEditor.exe" `
            -DestinationPath "dist/editor-windows-x64/MasterDataEditor-windows-x64-portable.zip" `
            -Force
          Remove-Item -Recurse -Force "dist/editor-windows-x64/portable"
      - uses: actions/upload-artifact@v7
        with:
          name: editor-windows-x64
          path: dist/editor-windows-x64/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - validate
      - build-cli
      - build-editor-macos
      - build-editor-windows
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          pattern: editor-*
          path: dist
          merge-multiple: true
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.validate.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --generate-notes \
              --verify-tag
          fi
